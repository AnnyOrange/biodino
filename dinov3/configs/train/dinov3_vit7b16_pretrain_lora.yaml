# DINOv3 ViT-7B Pretrain with LoRA
# This configuration enables LoRA fine-tuning on custom unlabeled datasets
# Based on dinov3_vit7b16_pretrain.yaml

MODEL:
  META_ARCHITECTURE: SSLMetaArchLoRA
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP
  # HSDP: model sharded across hsdp_shards GPUs per group.
  # Best practice for multi-node: set hsdp_shards = nproc_per_node so that
  # the FSDP shard group stays entirely within one node (uses fast NVLink /
  # intra-node PCIe), while cross-node communication is only a single
  # gradient all-reduce (DDP-style).
  # Override at runtime: compute_precision.hsdp_shards=6
  # Set to 1 to disable HSDP and use pure 1-D FSDP across all GPUs.
  hsdp_shards: 2

# LoRA Configuration
lora:
  r: 16                    # Rank of LoRA matrices (higher = more capacity, more params)
  alpha: 32.0              # Scaling factor (typically 2x of r)
  dropout: 0.05            # Dropout for LoRA layers
  target_modules: null     # null = default (qkv, proj, mlp layers). Or specify list like ["qkv", "proj"]
  enable_q: true           # Apply LoRA to Q projection
  enable_k: true           # Apply LoRA to K projection  
  enable_v: true           # Apply LoRA to V projection
  train_bias: false        # Whether to train bias parameters
  train_heads: true        # Whether to train DINO/IBOT heads (recommended for domain adaptation)

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 262144
  head_bottleneck_dim: 512
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 8192
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1
  koleo_distributed_replicas: 0
  koleo_distributed_loss_group_size: null
  force_weight_norm: false

ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5
  mask_ratio_min_max:
  - 0.1
  - 0.5
  mask_random_circular_shift: false
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 98304
  head_bottleneck_dim: 384
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 4096

gram:
  use_loss: false
  compute_stats: false

train:
  batch_size_per_gpu: 4   # Reduced for LoRA training (less memory needed)
  dataset_path: null       # Set this to your dataset path
  saveckp_freq: 20
  seed: 0
  num_workers: 10
  OFFICIAL_EPOCH_LENGTH: 1000
  monitor_gradient_norm: false
  chunk_schedule: []
  cache_dataset: true
  use_teacher_head: true
  learn_from_teacher_tokens: false
  centering: sinkhorn_knopp
  checkpointing: true
  checkpointing_full: false
  compile: true
  cudagraphs: false
  cell_augmentation: false
  cell_augmentation_type: hpa
  sharded_eval_checkpoint: true

student:
  arch: vit_7b
  patch_size: 16
  drop_path_rate: 0.4
  layerscale: 1.0e-05
  patch_drop: 0.0
  pretrained_weights: ''   # Path to pretrained DINOv3 checkpoint
  ffn_layer: swiglu64
  ffn_ratio: 3
  resume_from_teacher_chkpt: ''  # Set this to load pretrained weights
  qkv_bias: false
  proj_bias: true
  ffn_bias: true
  norm_layer: layernormbf16
  n_storage_tokens: 4
  untie_cls_and_patch_norms: false
  untie_global_and_local_cls_norm: true
  mask_k_bias: true
  in_chans: 3
  pos_embed_type: rope
  pos_embed_rope_base: 100
  pos_embed_rope_min_period: null
  pos_embed_rope_max_period: null
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_shift_coords: null
  pos_embed_rope_jitter_coords: null
  pos_embed_rope_rescale_coords: 2
  pos_embed_rope_dtype: fp32
  fp8_enabled: false
  fp8_filter: blocks

teacher:
  momentum_teacher: null
  final_momentum_teacher: null
  warmup_teacher_temp: null
  teacher_temp: null
  warmup_teacher_temp_epochs: null
  in_chans: 3

distillation:
  enabled: false
  full_cfg_path: ''
  checkpoint_path: ''

multidistillation:
  enabled: false

hrft:
  enabled: false
  checkpoint_path: ''

optim:
  epochs: 100              # Fewer epochs for fine-tuning
  optimizer: adamw
  weight_decay: null
  weight_decay_end: null
  lr: null
  warmup_epochs: null
  min_lr: null
  schedule_trunc_extra: null
  clip_grad: 30.0
  freeze_last_layer_epochs: null
  scaling_rule: sqrt_wrt_1024
  patch_embed_lr_mult: 0.2
  dino_head_wd_multiplier: 1.0
  layerwise_decay: 0.98
  multi_tensor_optim: true
  dump_fsdp_weights_path: ''
  adamw_beta1: 0.9
  adamw_beta2: 0.99

crops:
  global_crops_scale:
  - 0.32
  - 1.0
  local_crops_number: 8
  local_crops_scale:
  - 0.05
  - 0.32
  global_crops_size: 256
  local_crops_size: 112
  localcrops_subset_of_globalcrops: false
  share_color_jitter: false
  horizontal_flips: false
  # float_input=true: TIFF decoder outputs float32 [0,1] — keeps full 16-bit
  # precision.  RandomSolarize threshold is set to 0.5 (=128/255) automatically.
  float_input: true
  # TODO: replace with statistics computed from your actual ch3 dataset.
  # Use the compute_dataset_stats.py script or similar to get per-channel
  # mean and std over the training set (images already in [0,1] range).
  rgb_mean:
  - 0.485
  - 0.456
  - 0.406
  rgb_std:
  - 0.229
  - 0.224
  - 0.225

checkpointing:
  period: 500            # More frequent checkpoints for fine-tuning
  max_to_keep: 3
  keep_every: 10000

schedules:
  lr:
    start: 0
    peak: 1.0e-04        # Higher LR for LoRA (only training small part of model)
    end: 1.0e-05
    warmup_epochs: 10
    freeze_last_layer_epochs: 2
  weight_decay:
    start: 0.04
    peak: 0.04
    end: 0.04
    warmup_epochs: 0
  teacher_temp:
    start: 0.04
    peak: 0.07
    end: 0.07
    warmup_epochs: 10
  momentum:
    start: 0.994
    peak: 0.994
    end: 0.999
    warmup_epochs: 0

