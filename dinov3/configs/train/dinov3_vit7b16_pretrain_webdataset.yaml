# DINOv3 ViT-7B Pretrain with WebDataset
# 使用 WebDataset 流式读取多通道 TIFF 图像；适用于海量数据（100TB+）的自监督预训练。
#
# ── 数据模式（train.dataset_path 前缀）────────────────────────────────────────
#
#  旧格式（按通道分目录的单通道 tar）：
#    wds:/mnt/data/webds_micro_100k_by_channel/ch1/train-{000000..000129}.tar
#
#  新格式（data/repackage 打包的多通道 tar）：                ← 推荐
#    packwds:/mnt/data/wds_packed_shards/filtered_mixed_train_w*-{000000..000999}.tar
#
#    packwds: 每条样本包含 ch1.tif…chN.tif + meta.json，通道严格对齐。
#    缺失通道自动零填充至 target_channels 维度。
#    需同步修改：
#      student.in_chans / teacher.in_chans = target_channels（如 8）
#      train.target_channels = 8（命令行覆盖或在此 yaml 设置）
#
#  多流旧格式（各通道独立流 zip，通道不保证来自同一 FOV）：
#    multiwds:/mnt/data/{ch}/train-{000000..000128}.tar::ch1,ch2,...,ch8
#
#  S3 流式：
#    s3wds:s3://your-bucket/shards/train-{0000..9999}.tar
#
#  S3 先下载到本地：
#    cachewds:s3://your-bucket/shards/train-{0000..9999}.tar
#    （需同时设置 train.s3_cache_root）
#
# ─────────────────────────────────────────────────────────────────────────────

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP
  hsdp_shards: 1

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 262144
  head_bottleneck_dim: 512
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 8192
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1
  koleo_distributed_replicas: 0
  koleo_distributed_loss_group_size: null
  force_weight_norm: false

ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5
  mask_ratio_min_max:
  - 0.1
  - 0.5
  mask_random_circular_shift: false
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 98304
  head_bottleneck_dim: 384
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 4096

gram:
  use_loss: false
  compute_stats: false

train:
  batch_size_per_gpu: 16
  # 新格式示例（推荐）：
  # w* 会被 glob 解析为实际存在的 w00/w01/… 前缀文件，{000000..000999} 做花括号展开
  dataset_path: "packwds:/mnt/huawei_deepcad/wds_packed_shards/filtered_mixed_train_w*-{000000..000999}.tar"
  # 旧格式示例（仍然兼容）：
  # dataset_path: "wds:/mnt/huawei_deepcad/webds_micro_100k_by_channel/ch1/train-{000000..000129}.tar"
  target_channels: 8           # packwds 必填；输出 tensor 的通道数，需与 in_chans 一致
  aws_profile: null
  aws_region: null
  s3_cache_root: null
  saveckp_freq: 20
  seed: 0
  num_workers: 8          # WebDataset 推荐使用较多 workers
  OFFICIAL_EPOCH_LENGTH: 1000
  monitor_gradient_norm: false
  chunk_schedule: []
  cache_dataset: false    # WebDataset 不需要缓存
  use_teacher_head: true
  learn_from_teacher_tokens: false
  centering: sinkhorn_knopp
  checkpointing: true
  checkpointing_full: false
  compile: true
  cudagraphs: false
  cell_augmentation: false
  cell_augmentation_type: hpa
  sharded_eval_checkpoint: true

student:
  arch: vit_7b
  patch_size: 16
  drop_path_rate: 0.4
  layerscale: 1.0e-05
  patch_drop: 0.0
  pretrained_weights: ''
  ffn_layer: swiglu64
  ffn_ratio: 3
  resume_from_teacher_chkpt: ''
  qkv_bias: false
  proj_bias: true
  ffn_bias: true
  norm_layer: layernormbf16
  n_storage_tokens: 4
  untie_cls_and_patch_norms: false
  untie_global_and_local_cls_norm: true
  mask_k_bias: true
  in_chans: 8              # packwds 格式与 train.target_channels 保持一致
  enable_channelvit: true  # 启用 ChannelViT 处理多通道
  pos_embed_type: rope
  pos_embed_rope_base: 100
  pos_embed_rope_min_period: null
  pos_embed_rope_max_period: null
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_shift_coords: null
  pos_embed_rope_jitter_coords: null
  pos_embed_rope_rescale_coords: 2
  pos_embed_rope_dtype: fp32
  fp8_enabled: true
  fp8_filter: blocks

teacher:
  momentum_teacher: null
  final_momentum_teacher: null
  warmup_teacher_temp: null
  teacher_temp: null
  warmup_teacher_temp_epochs: null
  in_chans: 8
  enable_channelvit: true

distillation:
  enabled: false
  full_cfg_path: ''
  checkpoint_path: ''

multidistillation:
  enabled: false

hrft:
  enabled: false
  checkpoint_path: ''

optim:
  epochs: 1000
  optimizer: adamw
  weight_decay: null
  weight_decay_end: null
  lr: null
  warmup_epochs: null
  min_lr: null
  schedule_trunc_extra: null
  clip_grad: 30.0
  freeze_last_layer_epochs: null
  scaling_rule: sqrt_wrt_1024
  patch_embed_lr_mult: 0.2
  dino_head_wd_multiplier: 1.0
  layerwise_decay: 0.98
  multi_tensor_optim: true
  dump_fsdp_weights_path: ''
  adamw_beta1: 0.9
  adamw_beta2: 0.99

crops:
  global_crops_scale:
  - 0.32
  - 1.0
  local_crops_number: 8
  local_crops_scale:
  - 0.05
  - 0.32
  global_crops_size: 256
  local_crops_size: 112
  localcrops_subset_of_globalcrops: false
  share_color_jitter: false
  horizontal_flips: false
  float_input: true
  # 通道统计量：按实际数据通道数设置（命令行可覆盖）。
  # 如果通道数 > 列表长度，会循环填充；< 时截断。
  # 下面为 4 通道示例（值暂用 ImageNet 近似，建议用 compute_dataset_stats 计算真实值）。
  rgb_mean:
  - 0.175
  - 0.175
  - 0.175
  - 0.175
  rgb_std:
  - 0.264
  - 0.264
  - 0.264
  - 0.264

checkpointing:
  period: 1000
  max_to_keep: 3
  keep_every: 50000

schedules:
  lr:
    start: 0
    peak: 5.0e-05
    end: 5.0e-05
    warmup_epochs: 100
    freeze_last_layer_epochs: 5
  weight_decay:
    start: 0.04
    peak: 0.04
    end: 0.04
    warmup_epochs: 0
  teacher_temp:
    start: 0.04
    peak: 0.07
    end: 0.07
    warmup_epochs: 100
  momentum:
    start: 0.994
    peak: 0.994
    end: 0.994
    warmup_epochs: 0

